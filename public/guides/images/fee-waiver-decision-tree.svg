<svg viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .decision-box { fill: #1a1a2e; stroke: #0f3460; stroke-width: 2; }
      .action-box { fill: #16213e; stroke: #0f3460; stroke-width: 2; }
      .result-good { fill: #0a7d2f; stroke: #05561a; stroke-width: 2; }
      .result-bad { fill: #c92a47; stroke: #a01f36; stroke-width: 2; }
      .text-white { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; }
      .text-title { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .text-heading { fill: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .arrow { stroke: #0f3460; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .yes-label { fill: #0a7d2f; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .no-label { fill: #c92a47; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0f3460" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" class="bg"/>

  <!-- Title -->
  <text x="400" y="50" class="text-heading" text-anchor="middle">Annual Fee Waiver Decision Tree</text>

  <!-- Start -->
  <rect x="300" y="90" width="200" height="80" rx="10" class="decision-box"/>
  <text x="400" y="120" class="text-title" text-anchor="middle">Annual Fee</text>
  <text x="400" y="145" class="text-title" text-anchor="middle">Due?</text>

  <!-- No path - downgrade -->
  <path d="M 300 130 L 150 220" class="arrow"/>
  <text x="220" y="165" class="no-label">No</text>
  <rect x="70" y="220" width="160" height="70" rx="10" class="result-good"/>
  <text x="150" y="250" class="text-white" text-anchor="middle">Keep Card</text>
  <text x="150" y="270" class="text-white" text-anchor="middle">Active</text>

  <!-- Yes path -->
  <path d="M 500 130 L 650 220" class="arrow"/>
  <text x="580" y="165" class="yes-label">Yes</text>

  <!-- Calculate Benefit -->
  <rect x="550" y="220" width="200" height="80" rx="10" class="decision-box"/>
  <text x="650" y="245" class="text-title" text-anchor="middle">Calculate</text>
  <text x="650" y="270" class="text-title" text-anchor="middle">Benefit vs Fee</text>

  <!-- Benefit comparison -->
  <path d="M 650 300 L 650 380" class="arrow"/>

  <rect x="550" y="380" width="200" height="80" rx="10" class="decision-box"/>
  <text x="650" y="405" class="text-title" text-anchor="middle">Benefit >Fee</text>
  <text x="650" y="430" class="text-title" text-anchor="middle">?</text>

  <!-- Yes - Keep -->
  <path d="M 650 460 L 650 530" class="arrow"/>
  <text x="670" y="490" class="yes-label">Yes</text>

  <rect x="550" y="530" width="200" height="70" rx="10" class="result-good"/>
  <text x="650" y="560" class="text-white" text-anchor="middle">Keep Card</text>
  <text x="650" y="580" class="text-white" text-anchor="middle">(Benefit Justifies Fee)</text>

  <!-- No - Enter negotiation path -->
  <path d="M 550 420 L 400 420 L 400 500" class="arrow"/>
  <text x="460" y="410" class="no-label">No</text>

  <!-- Can Negotiate -->
  <rect x="300" y="500" width="200" height="80" rx="10" class="decision-box"/>
  <text x="400" y="525" class="text-title" text-anchor="middle">Can</text>
  <text x="400" y="550" class="text-title" text-anchor="middle">Negotiate?</text>

  <!-- Call Retention Yes -->
  <path d="M 400 580 L 400 650" class="arrow"/>
  <text x="420" y="610" class="yes-label">Yes</text>

  <rect x="300" y="650" width="200" height="80" rx="10" class="action-box"/>
  <text x="400" y="675" class="text-title" text-anchor="middle">Call Retention</text>
  <text x="400" y="700" class="text-title" text-anchor="middle">Team</text>

  <!-- Got offer -->
  <path d="M 400 730 L 400 800" class="arrow"/>

  <rect x="300" y="800" width="200" height="80" rx="10" class="decision-box"/>
  <text x="400" y="825" class="text-title" text-anchor="middle">Got Fee</text>
  <text x="400" y="850" class="text-title" text-anchor="middle">Waiver Offer?</text>

  <!-- Got offer - Accept -->
  <path d="M 500 840 L 600 840 L 600 900" class="arrow"/>
  <text x="550" y="820" class="yes-label">Yes</text>

  <rect x="550" y="900" width="200" height="70" rx="10" class="result-good"/>
  <text x="650" y="925" class="text-white" text-anchor="middle">Accept Offer</text>
  <text x="650" y="945" class="text-white" text-anchor="middle">(Fee Waived)</text>

  <!-- No offer - Check downgrade -->
  <path d="M 300 840 L 200 840 L 200 900" class="arrow"/>
  <text x="260" y="820" class="no-label">No</text>

  <rect x="100" y="900" width="200" height="80" rx="10" class="decision-box"/>
  <text x="200" y="920" class="text-title" text-anchor="middle">Downgrade</text>
  <text x="200" y="945" class="text-title" text-anchor="middle">Available?</text>

  <!-- Downgrade yes -->
  <path d="M 200 980 L 200 1040" class="arrow"/>
  <text x="180" y="1010" class="yes-label">Yes</text>

  <rect x="100" y="1040" width="200" height="50" rx="10" class="result-good"/>
  <text x="200" y="1067" class="text-white" text-anchor="middle">Downgrade Card</text>

  <!-- Downgrade no - Cancel -->
  <path d="M 300 940 L 400 940 L 400 1040" class="arrow"/>
  <text x="340" y="930" class="no-label">No</text>

  <rect x="300" y="1040" width="200" height="50" rx="10" class="result-bad"/>
  <text x="400" y="1067" class="text-white" text-anchor="middle">Cancel Card</text>

  <!-- Cannot negotiate path -->
  <path d="M 300 540 L 150 540 L 150 650" class="arrow"/>
  <text x="200" y="530" class="no-label">No</text>

  <rect x="50" y="650" width="200" height="80" rx="10" class="decision-box"/>
  <text x="150" y="675" class="text-title" text-anchor="middle">Downgrade</text>
  <text x="150" y="700" class="text-title" text-anchor="middle">Available?</text>

  <path d="M 150 730 L 150 780" class="arrow"/>
  <path d="M 150 780 L 150 820" class="arrow"/>
</svg>