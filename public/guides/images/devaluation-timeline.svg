    <rect x="640" y="350" width="140" height="90" fill="white" stroke="#e94560" stroke-width="2" rx="4"/>
    <text x="710" y="368" font-size="10" font-weight="bold" fill="#e94560" text-anchor="middle">
      IDFC FIRST: 1% Fee
    </text>
    <text x="710" y="384" font-size="10" fill="#1a1a2e" text-anchor="middle">
