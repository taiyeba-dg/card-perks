    <!-- Event label above -->
    <rect x="570" y="175" width="140" height="90" fill="white" stroke="#e94560" stroke-width="2" rx="4"/>
    <text x="640" y="193" font-size="11" font-weight="bold" fill="#e94560" text-anchor="middle">
      ICICI BookMyShow
    </text>
    <text x="640" y="209" font-size="11" fill="#1a1a2e" text-anchor="middle">
      Threshold Raised
    </text>
    <text x="640" y="228" font-size="10" fill="#16213e" text-anchor="middle" font-style="italic">
      Now ₹25K spend
    </text>
    <text x="640" y="243" font-size="10" fill="#16213e" text-anchor="middle" font-style="italic">
