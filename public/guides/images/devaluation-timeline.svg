    </text>
    <text x="640" y="258" font-size="10" fill="#16213e" text-anchor="middle" font-style="italic">
      voucher benefit
    </text>

    <!-- Connector line -->
    <line x1="640" y1="265" x2="640" y2="175" stroke="#e94560" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Event 6: 2026 Additional -->
  <g id="event6">
    <circle cx="710" cy="280" r="10" fill="#e94560" stroke="#1a1a2e" stroke-width="2"/>

    <text x="710" y="330" font-size="12" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
