    </text>

    <!-- Connector line -->
    <line x1="380" y1="265" x2="380" y2="190" stroke="#e94560" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Event 4: Jan 2026 -->
  <g id="event4">
    <circle cx="510" cy="280" r="10" fill="#e94560" stroke="#1a1a2e" stroke-width="2"/>

    <text x="510" y="330" font-size="12" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      Jan 2026
    </text>

    <!-- Event label below -->
    <rect x="440" y="350" width="140" height="75" fill="white" stroke="#e94560" stroke-width="2" rx="4"/>
    <text x="510" y="368" font-size="11" font-weight="bold" fill="#e94560" text-anchor="middle">
