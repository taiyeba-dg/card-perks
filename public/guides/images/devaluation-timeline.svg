    <!-- Connector line -->
    <line x1="510" y1="295" x2="510" y2="350" stroke="#e94560" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Event 5: Feb 2026 -->
  <g id="event5">
    <circle cx="640" cy="280" r="10" fill="#e94560" stroke="#1a1a2e" stroke-width="2"/>

    <text x="640" y="330" font-size="12" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      Feb 2026
