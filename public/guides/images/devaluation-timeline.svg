    <text x="710" y="408" font-size="10" font-weight="bold" fill="#e94560" text-anchor="middle">
      Axis ACE: Lounge
    </text>
    <text x="710" y="424" font-size="10" fill="#1a1a2e" text-anchor="middle">
      ₹1.5L spend req.
    </text>

    <!-- Connector line -->
    <line x1="710" y1="295" x2="710" y2="350" stroke="#e94560" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Bottom note -->
  <rect x="30" y="445" width="740" height="45" fill="white" stroke="#16213e" stroke-width="1" rx="4"/>
  <text x="50" y="468" font-size="12" fill="#1a1a2e" font-weight="bold">
    Trend: Issuers reducing benefits as costs rise. Monitor cards for further changes.
  </text>
</svg>