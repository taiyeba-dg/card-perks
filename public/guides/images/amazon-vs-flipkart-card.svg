<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
    Amazon vs Flipkart Card
  </text>

  <!-- Left column: Amazon Pay ICICI -->
  <g id="amazon-column">
    <!-- Card name -->
    <text x="150" y="85" font-size="18" font-weight="bold" fill="#0f3460" text-anchor="middle">
      Amazon Pay ICICI
    </text>

    <!-- Box background -->
    <rect x="50" y="100" width="250" height="450" fill="white" stroke="#16213e" stroke-width="2" rx="8"/>

    <!-- Details -->
    <text x="70" y="130" font-size="13" font-weight="bold" fill="#1a1a2e">Annual Fee</text>
    <text x="70" y="150" font-size="16" font-weight="bold" fill="#e94560">LTF</text>

    <line x1="60" y1="165" x2="290" y2="165" stroke="#16213e" stroke-width="1"/>

    <text x="70" y="190" font-size="13" font-weight="bold" fill="#1a1a2e">Cashback</text>
    <text x="70" y="215" font-size="12" fill="#1a1a2e">
      <tspan>Prime Members</tspan>
      <tspan x="70" dy="18">● 5% Amazon</tspan>
      <tspan x="70" dy="18">● 3% Non-Prime</tspan>
      <tspan x="70" dy="18">● 2% Partners</tspan>
    </text>

    <line x1="60" y1="285" x2="290" y2="285" stroke="#16213e" stroke-width="1"/>

    <text x="70" y="310" font-size="13" font-weight="bold" fill="#1a1a2e">Lounge Access</text>
    <text x="70" y="332" font-size="14" fill="#e94560">✗ None</text>

    <line x1="60" y1="345" x2="290" y2="345" stroke="#16213e" stroke-width="1"/>

    <text x="70" y="370" font-size="13" font-weight="bold" fill="#1a1a2e">Best For</text>
    <text x="70" y="395" font-size="11" fill="#1a1a2e">
      <tspan>Prime members shopping on</tspan>
      <tspan x="70" dy="15">Amazon regularly</tspan>
    </text>

    <text x="70" y="425" font-size="11" fill="#16213e" font-style="italic">
      Lifetime free = best for budget
    </text>
  </g>

  <!-- VS Badge in center -->
  <circle cx="400" cy="330" r="35" fill="#e94560" stroke="#1a1a2e" stroke-width="3"/>
  <text x="400" y="340" font-size="20" font-weight="bold" fill="white" text-anchor="middle">VS</text>

  <!-- Right column: Flipkart Axis -->
  <g id="flipkart-column">
    <!-- Card name -->
    <text x="650" y="85" font-size="18" font-weight="bold" fill="#0f3460" text-anchor="middle">
      Flipkart Axis
    </text>

    <!-- Box background -->
    <rect x="500" y="100" width="250" height="450" fill="white" stroke="#16213e" stroke-width="2" rx="8"/>

    <!-- Details -->
    <text x="520" y="130" font-size="13" font-weight="bold" fill="#1a1a2e">Annual Fee</text>
    <text x="520" y="150" font-size="16" font-weight="bold" fill="#e94560">₹500</text>

    <line x1="510" y1="165" x2="740" y2="165" stroke="#16213e" stroke-width="1"/>

    <text x="520" y="190" font-size="13" font-weight="bold" fill="#1a1a2e">Cashback</text>
    <text x="520" y="215" font-size="12" fill="#1a1a2e">
      <tspan>● 5% Flipkart</tspan>
      <tspan x="520" dy="18">● 7.5% Myntra*</tspan>
      <tspan x="520" dy="18">● 4% Uber/Swiggy</tspan>
    </text>
    <text x="520" y="275" font-size="10" fill="#16213e" font-style="italic">*Capped at benefits</text>

    <line x1="510" y1="290" x2="740" y2="290" stroke="#16213e" stroke-width="1"/>

    <text x="520" y="315" font-size="13" font-weight="bold" fill="#1a1a2e">Lounge Access</text>
    <text x="520" y="337" font-size="14" fill="#e94560">✓ Priority Pass</text>

    <line x1="510" y1="350" x2="740" y2="350" stroke="#16213e" stroke-width="1"/>

    <text x="520" y="375" font-size="13" font-weight="bold" fill="#1a1a2e">Best For</text>
    <text x="520" y="400" font-size="11" fill="#1a1a2e">
      <tspan>Multi-category spenders</tspan>
      <tspan x="520" dy="15">with lounge needs</tspan>
    </text>

    <text x="520" y="430" font-size="11" fill="#16213e" font-style="italic">
      Premium benefits = paid tier
    </text>
  </g>

  <!-- Bottom comparison footer -->
  <rect x="30" y="575" width="740" height="20" fill="#16213e" rx="4"/>
  <text x="400" y="589" font-size="11" fill="white" text-anchor="middle" font-weight="bold">
    Choose Amazon for savings, Flipkart for rewards + lounge benefits
  </text>
</svg>