<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <!-- Background -->
  <rect width="800" height="550" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
    Lounge Access Status - 2026
  </text>

  <!-- Subtitle -->
  <text x="400" y="65" font-size="13" fill="#16213e" text-anchor="middle">
    Airport &amp; Service Lounge Availability by Card
  </text>

  <!-- Service Providers Section -->
  <text x="50" y="110" font-size="16" font-weight="bold" fill="#1a1a2e">Service Providers:</text>

  <!-- Provider 1: DreamFolks (Defunct) -->
  <g id="provider1">
    <!-- Status indicator - RED X -->
    <circle cx="80" cy="145" r="18" fill="#e94560"/>
    <text x="80" y="152" font-size="24" fill="white" text-anchor="middle" font-weight="bold">✕</text>

    <!-- Provider name with strikethrough -->
    <line x1="110" y1="140" x2="240" y2="140" stroke="#e94560" stroke-width="2"/>
    <text x="110" y="152" font-size="14" fill="#e94560" font-weight="bold">DreamFolks</text>

    <!-- Details -->
    <text x="110" y="172" font-size="11" fill="#16213e">
      <tspan>Defunct - Lost Adani &amp; Encalm contracts</tspan>
    </text>
    <text x="110" y="187" font-size="10" fill="#e94560" font-style="italic">
      No longer active
    </text>
  </g>

  <!-- Provider 2: Priority Pass (Active) -->
  <g id="provider2">
    <!-- Status indicator - GREEN CHECK -->
    <circle cx="80" cy="245" r="18" fill="#16213e"/>
    <text x="80" y="255" font-size="20" fill="#f5f5f5" text-anchor="middle" font-weight="bold">✓</text>

    <text x="110" y="252" font-size="14" fill="#0f3460" font-weight="bold">Priority Pass</text>

    <!-- Details -->
    <text x="110" y="272" font-size="11" fill="#16213e">
      <tspan>Active &amp; Widely Accepted</tspan>
    </text>
    <text x="110" y="287" font-size="10" fill="#0f3460" font-style="italic">
      Access to 1,300+ lounges globally
    </text>
  </g>

  <!-- Provider 3: Bank Direct -->
  <g id="provider3">
    <!-- Status indicator - GREEN CHECK -->
    <circle cx="80" cy="345" r="18" fill="#16213e"/>
    <text x="80" y="355" font-size="20" fill="#f5f5f5" text-anchor="middle" font-weight="bold">✓</text>

    <text x="110" y="352" font-size="14" fill="#0f3460" font-weight="bold">Bank Direct (Encalm/TFS)</text>

    <!-- Details -->
    <text x="110" y="372" font-size="11" fill="#16213e">
      <tspan>Active - Limited availability</tspan>
    </text>
    <text x="110" y="387" font-size="10" fill="#0f3460" font-style="italic">
      Select premium cards only
    </text>
  </g>

  <!-- Vertical divider -->
  <line x1="420" y1="100" x2="420" y2="400" stroke="#16213e" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Cards Section -->
  <text x="450" y="110" font-size="16" font-weight="bold" fill="#1a1a2e">Cards with Lounge Access:</text>

  <!-- Card 1: HDFC Infinia -->
  <g id="card1">
    <rect x="450" y="135" width="300" height="70" fill="white" stroke="#0f3460" stroke-width="2" rx="6"/>

    <text x="470" y="158" font-size="13" font-weight="bold" fill="#0f3460">HDFC Infinia</text>

    <text x="470" y="178" font-size="12" fill="#1a1a2e">
      <tspan>Priority Pass Access</tspan>
    </text>

    <text x="470" y="195" font-size="11" fill="#16213e">
      <tspan font-weight="bold">Unlimited</tspan> complimentary visits
    </text>
  </g>

  <!-- Card 2: HDFC Regalia Gold -->
  <g id="card2">
    <rect x="450" y="220" width="300" height="70" fill="white" stroke="#e94560" stroke-width="2" rx="6"/>

    <text x="470" y="243" font-size="13" font-weight="bold" fill="#0f3460">HDFC Regalia Gold</text>

    <text x="470" y="263" font-size="12" fill="#1a1a2e">
      <tspan>Priority Pass Access</tspan>
    </text>

    <text x="470" y="280" font-size="11" fill="#16213e">
      <tspan>Quarterly visits</tspan> (4/year complimentary)
    </text>
  </g>

  <!-- Card 3: Axis Magnus -->
  <g id="card3">
    <rect x="450" y="305" width="300" height="70" fill="white" stroke="#e94560" stroke-width="2" rx="6"/>

    <text x="470" y="328" font-size="13" font-weight="bold" fill="#0f3460">Axis Magnus</text>

    <text x="470" y="348" font-size="12" fill="#1a1a2e">
      <tspan>Bank Direct Lounge Access</tspan>
    </text>

    <text x="470" y="365" font-size="11" fill="#16213e">
      <tspan font-weight="bold">Limited:</tspan> Encalm lounges primarily
    </text>
  </g>

  <!-- Legend/Notes -->
  <rect x="30" y="440" width="740" height="95" fill="white" stroke="#16213e" stroke-width="1" rx="6"/>

  <text x="50" y="465" font-size="13" font-weight="bold" fill="#1a1a2e">Key Takeaways:</text>

  <text x="50" y="490" font-size="11" fill="#1a1a2e">
    <tspan>• Premium cards now rely on Priority Pass (Priority &amp; Select tiers) for lounge access</tspan>
  </text>

  <text x="50" y="508" font-size="11" fill="#1a1a2e">
    <tspan>• DreamFolks partnership ended - no longer available as benefit</tspan>
  </text>

  <text x="50" y="526" font-size="11" fill="#1a1a2e">
    <tspan>• Encalm/TFS provide limited alternatives for select premium cards</tspan>
  </text>
</svg>