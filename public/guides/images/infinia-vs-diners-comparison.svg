<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .text-heading { fill: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .text-title { fill: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .text-white { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .col-header { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; }
      .row-label { fill: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .left-col { fill: #1a1a2e; stroke: #0f3460; stroke-width: 2; }
      .right-col { fill: #16213e; stroke: #0f3460; stroke-width: 2; }
      .feature-box { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
      .better-box { fill: #e94560; }
      .checkmark { fill: #0a7d2f; font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" class="bg"/>

  <!-- Title -->
  <text x="400" y="50" class="text-heading" text-anchor="middle">HDFC Infinia vs Diners Club Black</text>

  <!-- Column Headers -->
  <rect x="50" y="80" width="300" height="60" rx="10" class="left-col"/>
  <text x="200" y="120" class="col-header">HDFC Infinia</text>

  <rect x="450" y="80" width="300" height="60" rx="10" class="right-col"/>
  <text x="600" y="120" class="col-header">Diners Club Black</text>

  <!-- Row 1: Annual Fee -->
  <rect x="50" y="160" width="300" height="70" rx="8" class="feature-box"/>
  <text x="70" y="185" class="row-label">Annual Fee</text>
  <rect x="60" y="195" width="280" height="25" rx="6" class="better-box"/>
  <text x="200" y="214" class="text-white" text-anchor="middle">₹12,500</text>

  <rect x="450" y="160" width="300" height="70" rx="8" class="feature-box"/>
  <text x="470" y="185" class="row-label">Annual Fee</text>
  <rect x="460" y="195" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="600" y="214" class="text-white" text-anchor="middle">₹10,000</text>

  <!-- Row 2: Fee Waiver -->
  <rect x="50" y="250" width="300" height="70" rx="8" class="feature-box"/>
  <text x="70" y="275" class="row-label">Fee Waiver</text>
  <rect x="60" y="285" width="280" height="25" rx="6" class="better-box"/>
  <text x="200" y="304" class="text-white" text-anchor="middle">₹10L Spend</text>

  <rect x="450" y="250" width="300" height="70" rx="8" class="feature-box"/>
  <text x="470" y="275" class="row-label">Fee Waiver</text>
  <rect x="460" y="285" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="600" y="304" class="text-white" text-anchor="middle">₹5L Spend</text>

  <!-- Row 3: Reward Rate -->
  <rect x="50" y="340" width="300" height="70" rx="8" class="feature-box"/>
  <text x="70" y="365" class="row-label">Reward Rate</text>
  <rect x="60" y="375" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="200" y="394" class="text-white" text-anchor="middle">3.3% on most purchases</text>

  <rect x="450" y="340" width="300" height="70" rx="8" class="feature-box"/>
  <text x="470" y="365" class="row-label">Reward Rate</text>
  <rect x="460" y="375" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="600" y="394" class="text-white" text-anchor="middle">3.3% on most purchases</text>

  <!-- Row 4: Golf Privileges -->
  <rect x="50" y="430" width="300" height="70" rx="8" class="feature-box"/>
  <text x="70" y="455" class="row-label">Golf Privileges</text>
  <rect x="60" y="465" width="280" height="25" rx="6" class="better-box"/>
  <text x="200" y="484" class="text-white" text-anchor="middle">Unlimited Rounds</text>

  <rect x="450" y="430" width="300" height="70" rx="8" class="feature-box"/>
  <text x="470" y="455" class="row-label">Golf Privileges</text>
  <rect x="460" y="465" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="600" y="484" class="text-white" text-anchor="middle">6 Rounds / Quarter</text>

  <!-- Row 5: Network -->
  <rect x="50" y="520" width="300" height="70" rx="8" class="feature-box"/>
  <text x="70" y="545" class="row-label">Network</text>
  <rect x="60" y="555" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="200" y="574" class="text-white" text-anchor="middle">Visa / Mastercard</text>

  <rect x="450" y="520" width="300" height="70" rx="8" class="feature-box"/>
  <text x="470" y="545" class="row-label">Network</text>
  <rect x="460" y="555" width="280" height="25" rx="6" fill="#0a7d2f"/>
  <text x="600" y="574" class="text-white" text-anchor="middle">Diners Club</text>

  <!-- Verdict Box -->
  <rect x="50" y="620" width="700" height="60" rx="10" fill="#1a1a2e" stroke="#0f3460" stroke-width="2"/>
  <text x="400" y="645" class="col-header">Best For: Golf Lovers + High Spenders with HDFC Infinia (unlimited golf)</text>
  <text x="400" y="667" class="text-white" text-anchor="middle" font-size="12">Choose based on: Spending capacity, need for golf privileges, acceptance at merchant terminals</text>
</svg>