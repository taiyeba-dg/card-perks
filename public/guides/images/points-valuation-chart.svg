<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <!-- Background -->
  <rect width="800" height="550" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
    Points Valuation Across Issuers
  </text>

  <!-- Subtitle -->
  <text x="400" y="65" font-size="12" fill="#16213e" text-anchor="middle">
    Comparison of redemption value at minimum vs optimal rates
  </text>

  <!-- Legend -->
  <g id="legend">
    <rect x="100" y="80" width="15" height="15" fill="#16213e"/>
    <text x="125" y="92" font-size="11" fill="#1a1a2e">Standard Redemption</text>

    <rect x="420" y="80" width="15" height="15" fill="#0f3460"/>
    <text x="440" y="92" font-size="11" fill="#1a1a2e">Optimal Redemption</text>
  </g>

  <!-- Issuer 1: HDFC -->
  <g id="issuer1">
    <text x="50" y="140" font-size="14" font-weight="bold" fill="#1a1a2e">HDFC RewardPoints</text>

    <!-- Standard bar (Cash) -->
    <rect x="50" y="155" width="180" height="25" fill="#16213e"/>
    <text x="235" y="172" font-size="13" font-weight="bold" fill="#e94560">₹0.50</text>
    <text x="60" y="172" font-size="12" fill="white" font-weight="500">Cash Redemption</text>

    <!-- Optimal bar (SmartBuy) -->
    <rect x="50" y="185" width="360" height="25" fill="#0f3460"/>
    <text x="415" y="202" font-size="13" font-weight="bold" fill="#e94560">₹1.00</text>
    <text x="60" y="202" font-size="12" fill="white" font-weight="500">SmartBuy Portal</text>
  </g>

  <!-- Issuer 2: Amex -->
  <g id="issuer2">
    <text x="500" y="140" font-size="14" font-weight="bold" fill="#1a1a2e">Amex MR Points</text>

    <!-- Standard bar (Catalogue) -->
    <rect x="500" y="155" width="108" height="25" fill="#16213e"/>
    <text x="613" y="172" font-size="13" font-weight="bold" fill="#e94560">₹0.30</text>
    <text x="510" y="172" font-size="12" fill="white" font-weight="500">Catalogue</text>

    <!-- Optimal bar (Transfer) -->
    <rect x="500" y="185" width="360" height="25" fill="#0f3460"/>
    <text x="865" y="202" font-size="13" font-weight="bold" fill="#e94560">₹1.00+</text>
    <text x="510" y="202" font-size="12" fill="white" font-weight="500">Transfer Partners</text>
  </g>

  <!-- Issuer 3: SBI -->
  <g id="issuer3">
    <text x="50" y="250" font-size="14" font-weight="bold" fill="#1a1a2e">SBI Reward Points</text>

    <!-- Standard bar (Cash) -->
    <rect x="50" y="265" width="90" height="25" fill="#16213e"/>
    <text x="145" y="282" font-size="13" font-weight="bold" fill="#e94560">₹0.25</text>
    <text x="60" y="282" font-size="12" fill="white" font-weight="500">Cash</text>

    <!-- Optimal bar (Vouchers) -->
    <rect x="50" y="295" width="180" height="25" fill="#0f3460"/>
    <text x="235" y="312" font-size="13" font-weight="bold" fill="#e94560">₹0.50</text>
    <text x="60" y="312" font-size="12" fill="white" font-weight="500">Vouchers</text>
  </g>

  <!-- Issuer 4: Axis EDGE -->
  <g id="issuer4">
    <text x="500" y="250" font-size="14" font-weight="bold" fill="#1a1a2e">Axis EDGE Rewards</text>

    <!-- Standard bar (Cash) -->
    <rect x="500" y="265" width="180" height="25" fill="#16213e"/>
    <text x="685" y="282" font-size="13" font-weight="bold" fill="#e94560">₹0.50</text>
    <text x="510" y="282" font-size="12" fill="white" font-weight="500">Cash Redemption</text>

    <!-- Optimal bar (Travel) -->
    <rect x="500" y="295" width="270" height="25" fill="#0f3460"/>
    <text x="775" y="312" font-size="13" font-weight="bold" fill="#e94560">₹0.75</text>
    <text x="510" y="312" font-size="12" fill="white" font-weight="500">Travel Redemption</text>
  </g>

  <!-- Issuer 5: ICICI -->
  <g id="issuer5">
    <text x="50" y="360" font-size="14" font-weight="bold" fill="#1a1a2e">ICICI Reward Points</text>

    <!-- Standard bar (Low) -->
    <rect x="50" y="375" width="90" height="25" fill="#16213e"/>
    <text x="145" y="392" font-size="13" font-weight="bold" fill="#e94560">₹0.25</text>
    <text x="60" y="392" font-size="12" fill="white" font-weight="500">Low Rate</text>

    <!-- Optimal bar (Higher) -->
    <rect x="50" y="405" width="180" height="25" fill="#0f3460"/>
    <text x="235" y="422" font-size="13" font-weight="bold" fill="#e94560">₹0.50</text>
    <text x="60" y="422" font-size="12" fill="white" font-weight="500">Higher Rate</text>
  </g>

  <!-- Comparison summary -->
  <rect x="30" y="460" width="740" height="75" fill="white" stroke="#16213e" stroke-width="1" rx="6"/>

  <text x="50" y="485" font-size="13" font-weight="bold" fill="#1a1a2e">Best Value Strategy:</text>

  <text x="50" y="505" font-size="11" fill="#1a1a2e">
    <tspan>HDFC SmartBuy and Amex Transfer Partners offer ₹1/point value</tspan>
  </text>

  <text x="50" y="523" font-size="11" fill="#1a1a2e">
    <tspan>SBI &amp; ICICI offer lower value; prioritize cash redemption or partner vouchers</tspan>
  </text>
</svg>