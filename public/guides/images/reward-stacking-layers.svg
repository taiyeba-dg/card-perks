<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f5f5f5; }
      .text-heading { fill: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .text-title { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .text-white { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; }
      .text-percent { fill: white; font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .text-desc { fill: #666; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .layer-bottom { fill: #e94560; stroke: #c92a47; stroke-width: 2; }
      .layer-2 { fill: #0f3460; stroke: #081f3e; stroke-width: 2; }
      .layer-3 { fill: #16213e; stroke: #0a1428; stroke-width: 2; }
      .layer-top { fill: #1a1a2e; stroke: #0f0f1a; stroke-width: 2; }
      .shadow { fill: rgba(0,0,0,0.15); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" class="bg"/>

  <!-- Title -->
  <text x="400" y="50" class="text-heading" text-anchor="middle">The Reward Stacking Strategy</text>
  <text x="400" y="80" class="text-desc">Layer Multiple Discounts to Maximize Savings</text>

  <!-- Pyramid/Stack Layers -->

  <!-- Layer 4 (Top) - Bank Portal -->
  <defs>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Layer 4 -->
    <polygon points="400,150 550,250 250,250" class="layer-top"/>
    <polygon points="400,150 550,250 250,250" fill="none" stroke="#1a1a2e" stroke-width="2"/>

    <text x="400" y="210" class="text-percent">1-3%</text>
    <text x="400" y="235" class="text-white">Bank Portal Cashback</text>

    <!-- Layer 3 -->
    <polygon points="600,250 750,350 50,350" class="layer-3"/>
    <polygon points="600,250 750,350 50,350" fill="none" stroke="#0a1428" stroke-width="2"/>

    <text x="400" y="310" class="text-percent">2-5%</text>
    <text x="400" y="335" class="text-white">Credit Card Rewards</text>

    <!-- Layer 2 -->
    <polygon points="700,350 800,450 0,450" class="layer-2"/>
    <polygon points="700,350 800,450 0,450" fill="none" stroke="#081f3e" stroke-width="2"/>

    <text x="400" y="410" class="text-percent">5-15%</text>
    <text x="400" y="435" class="text-white">Voucher / Gift Card Discount</text>

    <!-- Layer 1 (Bottom) -->
    <polygon points="750,450 850,550 -50,550" class="layer-bottom"/>
    <polygon points="750,450 850,550 -50,550" fill="none" stroke="#c92a47" stroke-width="2"/>

    <text x="400" y="510" class="text-percent">10-40%</text>
    <text x="400" y="535" class="text-white">Sale Price (Seasonal/Mega Sales)</text>
  </g>

  <!-- Total Savings Box -->
  <rect x="150" y="600" width="500" height="120" rx="10" fill="#1a1a2e" stroke="#0f3460" stroke-width="3"/>
  <text x="400" y="635" class="text-title" text-anchor="middle" fill="white">Total Potential Savings</text>
  <text x="400" y="675" class="text-percent" fill="#e94560">Up to 50%+ Discount</text>
  <text x="400" y="705" class="text-white" fill="white" font-size="13" text-anchor="middle">On Strategic Purchases</text>

  <!-- Example Breakdown -->
  <rect x="50" y="750" width="700" height="130" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="400" y="775" class="text-title" text-anchor="middle" fill="white">Example: ₹1,000 Purchase</text>

  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600">
    <text x="70" y="805" fill="white">Base Price: ₹1,000</text>
    <text x="70" y="830" fill="#e94560">-Sale: 25% = ₹750 (₹250 saved)</text>
    <text x="70" y="855" fill="#0f3460">-Voucher: 10% = ₹675 (₹75 saved)</text>

    <text x="450" y="805" fill="white">Card Rewards: 3% = ₹20</text>
    <text x="450" y="830" fill="#16213e">Portal Cashback: 2% = ₹13</text>
    <text x="450" y="855" fill="#fff" font-weight="700">Final: ₹642 (₹358 saved / 35%)</text>
  </g>

  <!-- Tips Section -->
  <rect x="50" y="900" width="700" height="15" rx="6"/>
  <text x="400" y="911" class="text-desc" text-anchor="middle" font-size="11">Pro Tip: Combine mega sales + gift cards + credit card rewards + bank portal offers for maximum savings</text>
</svg>