<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
    Cashback Rates Comparison
  </text>

  <!-- Legend -->
  <g id="legend">
    <circle cx="150" cy="65" r="4" fill="#0f3460"/>
    <text x="165" y="70" font-size="12" fill="#1a1a2e">Primary Category</text>

    <circle cx="380" cy="65" r="4" fill="#e94560"/>
    <text x="395" y="70" font-size="12" fill="#1a1a2e">Secondary Category</text>

    <circle cx="580" cy="65" r="4" fill="#16213e"/>
    <text x="595" y="70" font-size="12" fill="#1a1a2e">Other</text>
  </g>

  <!-- Card 1: Amazon Pay ICICI -->
  <g id="card1">
    <text x="50" y="120" font-size="14" font-weight="bold" fill="#1a1a2e">Amazon Pay ICICI</text>

    <!-- Amazon bar -->
    <rect x="180" y="105" width="300" height="20" fill="#0f3460"/>
    <text x="485" y="118" font-size="13" font-weight="bold" fill="#e94560">5%</text>
    <text x="180" y="118" font-size="11" fill="white" font-weight="500">Amazon</text>

    <!-- Others bar -->
    <rect x="180" y="130" width="120" height="20" fill="#e94560"/>
    <text x="305" y="143" font-size="13" font-weight="bold" fill="#1a1a2e">2%</text>
    <text x="180" y="143" font-size="11" fill="white" font-weight="500">Other</text>
  </g>

  <!-- Card 2: Flipkart Axis -->
  <g id="card2">
    <text x="50" y="185" font-size="14" font-weight="bold" fill="#1a1a2e">Flipkart Axis</text>

    <!-- Flipkart bar -->
    <rect x="180" y="170" width="300" height="16" fill="#0f3460"/>
    <text x="485" y="182" font-size="13" font-weight="bold" fill="#e94560">5%</text>
    <text x="180" y="182" font-size="11" fill="white" font-weight="500">Flipkart</text>

    <!-- Myntra bar -->
    <rect x="180" y="191" width="450" height="16" fill="#e94560"/>
    <text x="635" y="203" font-size="13" font-weight="bold" fill="#1a1a2e">7.5%</text>
    <text x="180" y="203" font-size="11" fill="white" font-weight="500">Myntra</text>

    <!-- Partners bar -->
    <rect x="180" y="212" width="240" height="16" fill="#16213e"/>
    <text x="425" y="224" font-size="13" font-weight="bold" fill="#e94560">4%</text>
    <text x="180" y="224" font-size="11" fill="white" font-weight="500">Partners</text>
  </g>

  <!-- Card 3: HDFC Millennia -->
  <g id="card3">
    <text x="50" y="270" font-size="14" font-weight="bold" fill="#1a1a2e">HDFC Millennia</text>

    <!-- Online bar -->
    <rect x="180" y="255" width="300" height="18" fill="#0f3460"/>
    <text x="485" y="269" font-size="13" font-weight="bold" fill="#e94560">5%</text>
    <text x="180" y="269" font-size="11" fill="white" font-weight="500">Online Select</text>

    <!-- Other bar -->
    <rect x="180" y="278" width="60" height="18" fill="#e94560"/>
    <text x="245" y="292" font-size="13" font-weight="bold" fill="#1a1a2e">1%</text>
    <text x="180" y="292" font-size="11" fill="white" font-weight="500">Other</text>
  </g>

  <!-- Card 4: Axis ACE -->
  <g id="card4">
    <text x="50" y="350" font-size="14" font-weight="bold" fill="#1a1a2e">Axis ACE</text>

    <!-- All bar -->
    <rect x="180" y="335" width="120" height="16" fill="#0f3460"/>
    <text x="305" y="347" font-size="13" font-weight="bold" fill="#e94560">2%</text>
    <text x="180" y="347" font-size="11" fill="white" font-weight="500">All</text>

    <!-- GPay Bills bar -->
    <rect x="180" y="356" width="300" height="16" fill="#e94560"/>
    <text x="485" y="368" font-size="13" font-weight="bold" fill="#1a1a2e">5%</text>
    <text x="180" y="368" font-size="11" fill="white" font-weight="500">Bills via GPay</text>
  </g>

  <!-- Card 5: IDFC FIRST Select -->
  <g id="card5">
    <text x="50" y="420" font-size="14" font-weight="bold" fill="#1a1a2e">IDFC FIRST Select</text>

    <!-- All bar -->
    <rect x="180" y="405" width="90" height="20" fill="#0f3460"/>
    <text x="275" y="419" font-size="13" font-weight="bold" fill="#e94560">1.5%</text>
    <text x="180" y="419" font-size="11" fill="white" font-weight="500">All</text>
  </g>

  <!-- Scale reference line -->
  <line x1="180" y1="475" x2="720" y2="475" stroke="#16213e" stroke-width="1"/>
  <text x="180" y="495" font-size="11" fill="#1a1a2e">0%</text>
  <text x="365" y="495" font-size="11" fill="#1a1a2e">2.5%</text>
  <text x="550" y="495" font-size="11" fill="#1a1a2e">5%</text>
  <text x="720" y="495" font-size="11" fill="#1a1a2e">7.5%</text>
</svg>